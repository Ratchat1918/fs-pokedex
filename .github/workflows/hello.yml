name: Hello World!

on:
  push:
    branches:
      - main

jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: |
          echo "Hello World!"
  date_job:
    runs-on: ubuntu-latest
    steps:
      - name: Run date
        run: date
  date_ls:
    runs-on: ubuntu-latest
    steps:
      - name: Run LS -l
        run: ls -l
